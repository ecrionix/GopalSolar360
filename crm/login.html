<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Login | Gopal Solar 360</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">☀️ Gopal Solar<span class="dot">360</span></div>
    <div class="sub">CRM Admin Login</div>
    <div class="error-msg" id="errMsg"></div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" required>
      <label for="password">Password</label>
      <input type="password" id="password" required>
      <button type="submit" class="btn" style="width:100%;justify-content:center;">Sign In</button>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'dashboard.html';
  });

  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errMsg = document.getElementById('errMsg');
    errMsg.style.display = 'none';

    auth.signInWithEmailAndPassword(email, password)
      .then(() => { window.location.href = 'dashboard.html'; })
      .catch(err => {
        errMsg.textContent = err.message;
        errMsg.style.display = 'block';
      });
  });
</script>
</body>
</html>
