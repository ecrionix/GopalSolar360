<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Detail | Gopal Solar 360 CRM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="crm-layout">
  <aside class="sidebar">
    <div class="logo">☀️ Gopal Solar<span class="dot">360</span></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="dashboard.html#leads" class="active">Leads</a>
      <a href="tasks.html">Tasks / O&amp;M</a>
      <a href="../index.html" target="_blank">View Website</a>
    </nav>
    <button class="logout" id="logoutBtn">Sign Out</button>
  </aside>

  <main class="main">
    <h1 id="leadName">Lead</h1>
    <p class="subtitle" id="leadMeta"></p>

    <div class="row">
      <div style="flex:2;">
        <div class="card">
          <h3>Lead Information</h3>
          <div class="row">
            <div><label>Name</label><input type="text" id="fName"></div>
            <div><label>Phone</label><input type="tel" id="fPhone"></div>
            <div><label>Email</label><input type="email" id="fEmail"></div>
          </div>
          <div class="row">
            <div><label>City</label><input type="text" id="fCity"></div>
            <div><label>Property Type</label>
              <select id="fType"><option value="residential">Residential</option><option value="commercial">Commercial</option></select>
            </div>
            <div><label>Stage</label><select id="fStage"></select></div>
          </div>
          <div class="row">
            <div><label>Monthly Bill (₹)</label><input type="number" id="fBill"></div>
            <div><label>System Size (kW)</label><input type="number" step="0.1" id="fKw"></div>
          </div>
          <button class="btn" id="saveBtn">Save Changes</button>
          <button class="btn danger" id="deleteBtn">Delete Lead</button>
        </div>

        <div class="card">
          <h3>Notes</h3>
          <div id="notesList" style="margin-bottom:16px;"></div>
          <textarea id="noteInput" placeholder="Add a note..."></textarea>
          <button class="btn small" id="addNoteBtn">Add Note</button>
        </div>
      </div>

      <div style="flex:1;">
        <div class="card">
          <h3>Actions</h3>
          <a id="proposalLink" class="btn secondary" style="width:100%;justify-content:center;margin-bottom:10px;">Create / View Proposal</a>
          <a id="surveyLink" class="btn secondary" style="width:100%;justify-content:center;">Site Survey</a>
        </div>

        <div class="card">
          <h3>Quick Add Task</h3>
          <label>Description</label>
          <input type="text" id="tDesc">
          <label>Due Date</label>
          <input type="date" id="tDue">
          <button class="btn small" id="addTaskBtn" style="width:100%;justify-content:center;">Add Task</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  const STAGES = ['New Lead','Eligibility Checked','Site Survey Scheduled','Quote Sent','Documents Submitted','Installation Scheduled','Installed','Subsidy Received','Closed Won','Closed Lost'];
  const params = new URLSearchParams(window.location.search);
  const leadId = params.get('id');

  document.getElementById('proposalLink').href = 'proposal.html?id=' + leadId;
  document.getElementById('surveyLink').href = 'survey.html?id=' + leadId;

  const stageSel = document.getElementById('fStage');
  STAGES.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    stageSel.appendChild(opt);
  });

  auth.onAuthStateChanged(user => {
    if (!user) { window.location.href = 'login.html'; return; }
    if (!leadId) { window.location.href = 'dashboard.html'; return; }
    loadLead();
  });

  document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());

  let leadRef;
  function loadLead(){
    leadRef = db.collection('leads').doc(leadId);
    leadRef.get().then(doc => {
      if (!doc.exists) { alert('Lead not found'); window.location.href = 'dashboard.html'; return; }
      const l = doc.data();
      document.getElementById('leadName').textContent = l.name || 'Unnamed Lead';
      document.getElementById('leadMeta').textContent = 'Source: ' + (l.source || '-') + (l.createdAt && l.createdAt.toDate ? ' · Added ' + l.createdAt.toDate().toLocaleDateString('en-IN') : '');
      document.getElementById('fName').value = l.name || '';
      document.getElementById('fPhone').value = l.phone || '';
      document.getElementById('fEmail').value = l.email || '';
      document.getElementById('fCity').value = l.city || '';
      document.getElementById('fType').value = l.propertyType || 'residential';
      document.getElementById('fStage').value = l.stage || 'New Lead';
      document.getElementById('fBill').value = l.monthlyBill || '';
      document.getElementById('fKw').value = l.systemSizeKw || '';
      renderNotes(l.notes || []);
    });
  }

  function renderNotes(notes){
    const list = document.getElementById('notesList');
    if (!notes.length){ list.innerHTML = '<p style="color:var(--muted);font-size:.88rem;">No notes yet.</p>'; return; }
    list.innerHTML = notes.slice().reverse().map(n =>
      '<div style="border-bottom:1px solid #eef2f6;padding:10px 0;font-size:.88rem;"><strong>' + n.at + ':</strong> ' + n.text + '</div>'
    ).join('');
  }

  document.getElementById('saveBtn').addEventListener('click', () => {
    leadRef.update({
      name: document.getElementById('fName').value.trim(),
      phone: document.getElementById('fPhone').value.trim(),
      email: document.getElementById('fEmail').value.trim(),
      city: document.getElementById('fCity').value.trim(),
      propertyType: document.getElementById('fType').value,
      stage: document.getElementById('fStage').value,
      monthlyBill: Number(document.getElementById('fBill').value) || 0,
      systemSizeKw: Number(document.getElementById('fKw').value) || 0,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => { alert('Saved.'); loadLead(); });
  });

  document.getElementById('deleteBtn').addEventListener('click', () => {
    if (!confirm('Delete this lead permanently?')) return;
    leadRef.delete().then(() => { window.location.href = 'dashboard.html'; });
  });

  document.getElementById('addNoteBtn').addEventListener('click', () => {
    const text = document.getElementById('noteInput').value.trim();
    if (!text) return;
    leadRef.update({
      notes: firebase.firestore.FieldValue.arrayUnion({ text, at: new Date().toLocaleString('en-IN') })
    }).then(() => { document.getElementById('noteInput').value = ''; loadLead(); });
  });

  document.getElementById('addTaskBtn').addEventListener('click', () => {
    const desc = document.getElementById('tDesc').value.trim();
    const due = document.getElementById('tDue').value;
    if (!desc || !due) { alert('Description and due date required'); return; }
    db.collection('tasks').add({
      description: desc,
      dueDate: due,
      leadId: leadId,
      leadName: document.getElementById('fName').value.trim(),
      status: 'pending',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      document.getElementById('tDesc').value = '';
      document.getElementById('tDue').value = '';
      alert('Task added.');
    });
  });
</script>
</body>
</html>
